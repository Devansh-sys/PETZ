<!-- ═══════════════════════════════════════════════
     Healio – Floating Action Button
════════════════════════════════════════════════ -->
<div class="healio-fab" [class.is-open]="open" (click)="toggle()" title="Chat with Healio">

  <!-- Cute pet that peeks on hover -->
  <div class="pet-peek">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Cat face -->
      <circle cx="20" cy="22" r="13" fill="#FFD580"/>
      <!-- Ears -->
      <polygon points="8,14 12,4 17,14"  fill="#FFD580"/>
      <polygon points="23,14 28,4 32,14" fill="#FFD580"/>
      <polygon points="9,13 12,6 16,13"  fill="#FF9A9A" opacity="0.6"/>
      <polygon points="24,13 28,6 31,13" fill="#FF9A9A" opacity="0.6"/>
      <!-- Eyes -->
      <ellipse cx="15" cy="21" rx="2.5" ry="3" fill="#3D2B1F"/>
      <ellipse cx="25" cy="21" rx="2.5" ry="3" fill="#3D2B1F"/>
      <circle  cx="16" cy="20" r="0.8"  fill="white"/>
      <circle  cx="26" cy="20" r="0.8"  fill="white"/>
      <!-- Nose -->
      <ellipse cx="20" cy="26" rx="2" ry="1.3" fill="#FF9AAF"/>
      <!-- Mouth -->
      <path d="M18 27.5 Q20 29.5 22 27.5" stroke="#3D2B1F" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <!-- Whiskers left -->
      <line x1="5"  y1="24" x2="13" y2="25.5" stroke="#3D2B1F" stroke-width="0.7" opacity="0.5"/>
      <line x1="5"  y1="27" x2="13" y2="27"   stroke="#3D2B1F" stroke-width="0.7" opacity="0.5"/>
      <!-- Whiskers right -->
      <line x1="27" y1="25.5" x2="35" y2="24" stroke="#3D2B1F" stroke-width="0.7" opacity="0.5"/>
      <line x1="27" y1="27"   x2="35" y2="27" stroke="#3D2B1F" stroke-width="0.7" opacity="0.5"/>
    </svg>
  </div>

  <!-- Main circular button -->
  <div class="fab-btn">
    <!-- Paw print SVG -->
    <svg class="paw-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Palm pad -->
      <ellipse cx="20" cy="27" rx="9"   ry="8"   fill="white" opacity="0.95"/>
      <!-- Toe pads -->
      <ellipse cx="9"  cy="19" rx="4"   ry="4.8" fill="white" opacity="0.95"/>
      <ellipse cx="20" cy="15" rx="4"   ry="4.8" fill="white" opacity="0.95"/>
      <ellipse cx="31" cy="19" rx="4"   ry="4.8" fill="white" opacity="0.95"/>
      <ellipse cx="5"  cy="27" rx="3.2" ry="3.8" fill="white" opacity="0.8"/>
      <ellipse cx="35" cy="27" rx="3.2" ry="3.8" fill="white" opacity="0.8"/>
    </svg>
    <!-- Ripple ring shown when open -->
    @if (open) {
      <div class="fab-ring"></div>
    }
  </div>
</div>


<!-- ═══════════════════════════════════════════════
     Healio – Chat Window
════════════════════════════════════════════════ -->
@if (open) {
  <div class="healio-window">

    <!-- Header -->
    <div class="win-header">
      <div class="header-left">
        <div class="header-avatar">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="26" height="26">
            <ellipse cx="11" cy="9"  rx="3.5" ry="4.2" fill="white" opacity="0.9"/>
            <ellipse cx="18" cy="7"  rx="3.5" ry="4.2" fill="white" opacity="0.9"/>
            <ellipse cx="25" cy="9"  rx="3.5" ry="4.2" fill="white" opacity="0.9"/>
            <ellipse cx="6.5" cy="18" rx="3" ry="3.6"   fill="white" opacity="0.9"/>
            <ellipse cx="29.5" cy="18" rx="3" ry="3.6"  fill="white" opacity="0.9"/>
            <ellipse cx="18" cy="24"  rx="9.5" ry="8.5" fill="white" opacity="0.95"/>
          </svg>
        </div>
        <div class="header-info">
          <span class="header-name">Healio</span>
          <span class="header-status">
            <span class="status-dot"></span>AI Pet Assistant
          </span>
        </div>
      </div>
      <button class="close-btn" (click)="close()" title="Close">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <!-- Body / message list -->
    <div class="win-body" #chatBody>

      @if (loading && messages.length === 0) {
        <div class="init-loading">
          <div class="init-spinner"></div>
          <p>Loading your pet data…</p>
        </div>
      }

      @for (msg of messages; track $index) {
        <div class="msg-row" [class.user]="msg.role === 'user'" [class.healio]="msg.role === 'healio'">

          @if (msg.role === 'healio') {
            <div class="msg-avatar">
              <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <ellipse cx="7"  cy="6"  rx="2.4" ry="2.8" fill="white" opacity="0.9"/>
                <ellipse cx="12" cy="4.5" rx="2.4" ry="2.8" fill="white" opacity="0.9"/>
                <ellipse cx="17" cy="6"  rx="2.4" ry="2.8" fill="white" opacity="0.9"/>
                <ellipse cx="4"  cy="12" rx="2"   ry="2.4" fill="white" opacity="0.9"/>
                <ellipse cx="20" cy="12" rx="2"   ry="2.4" fill="white" opacity="0.9"/>
                <ellipse cx="12" cy="16" rx="6.5" ry="5.8" fill="white" opacity="0.95"/>
              </svg>
            </div>
          }

          <div class="msg-bubble">
            @if (msg.typing) {
              <div class="typing-dots">
                <span></span><span></span><span></span>
              </div>
            } @else {
              <div class="msg-text" [innerHTML]="msg.html ?? msg.text"></div>
              <div class="msg-time">{{ msg.time }}</div>
            }
          </div>

        </div>
      }

    </div><!-- /win-body -->

    <!-- Footer / input area -->
    <div class="win-footer">
      <textarea
        [(ngModel)]="inputText"
        (keydown)="onKeyDown($event)"
        placeholder="Ask me anything about your pets or the platform…"
        rows="1"
        [disabled]="loading"
        class="chat-input">
      </textarea>
      <button
        class="send-btn"
        (click)="send()"
        [disabled]="!inputText.trim() || loading"
        title="Send">
        <mat-icon>send</mat-icon>
      </button>
    </div>

  </div>
}
