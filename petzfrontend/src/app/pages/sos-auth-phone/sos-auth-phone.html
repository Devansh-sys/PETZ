<petz-navbar />

<section class="auth-page">
  <div class="auth-card">
    <div class="title-row">
      <a routerLink="/" class="back" aria-label="Back to home">←</a>
      <h1>Your number</h1>
    </div>
    <p class="lead">
      So we can call you back if needed. <strong>No OTP, no waiting.</strong>
    </p>

    <div class="field">
      <label for="phone">Mobile number</label>
      <div class="phone-input">
        <span class="cc">🇮🇳 +91</span>
        <input
          id="phone"
          type="tel"
          inputmode="numeric"
          autocomplete="tel"
          placeholder="98765 43210"
          maxlength="15"
          [ngModel]="phone()"
          (ngModelChange)="phone.set($event)"
          (keyup.enter)="proceed()">
      </div>
      <small class="hint">We'll dispatch the nearest rescuer immediately.</small>
    </div>

    @if (notice()) {
      <div class="alert info">
        <span>ℹ️</span>
        <span>{{ notice() }}</span>
      </div>
    }

    @if (error()) {
      <div class="alert error">
        <span>⚠️</span>
        <span>{{ error() }}</span>
      </div>
    }

    <button
      type="button"
      class="btn btn-primary btn-big"
      [disabled]="!canSubmit || loading()"
      (click)="proceed()">
      @if (loading()) { Starting… } @else { Continue to report → }
    </button>
  </div>
</section>
