
server.port=8081

# Database (Local MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/petz_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sreeja123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis (Cloud)
spring.data.redis.host=redis-12721.c212.ap-south-1-1.ec2.cloud.redislabs.com
spring.data.redis.port=12721
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# JWT
petz.jwt.secret=${JWT_SECRET:mySecretKeyForPetzAppThatIsLongEnough1234}
petz.jwt.expiration-ms=86400000
petz.jwt.temp-session-expiration-ms=43200000
petz.jwt.issuer=petz-platform

# OTP
petz.otp.expiry-minutes=5
petz.otp.max-requests-per-hour=5

# SOS Rate Limiting
petz.sos.rate-limit.max-per-hour=3

# File Upload (SOS Media)
app.file.upload-dir=uploads

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=BINARY



spring.jackson.time-zone=UTC

