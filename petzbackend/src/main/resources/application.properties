server.port=8081
 
# ─── Dev Data Seeder ──────────────────────────────────────────────────────────
# Set to true on a fresh machine to seed hospitals, NGOs, adoptable pets, and
# demo users. The seeder is idempotent — it skips if data already exists.
# Default credentials for all seeded accounts: Petz@1234
#   admin@petz.dev          → ADMIN
#   nandita@cupa.org.in     → NGO_REP  (CUPA — Bengaluru)
#   geeta@friendicoes.org   → NGO_REP  (Friendicoes — Delhi)
#   rahul@bspca.org.in      → NGO_REP  (BSPCA — Mumbai)
#   priya@pfa.org.in        → NGO_REP  (PFA — Hyderabad)
#   hospital@petz.dev       → HOSPITAL_REP
app.seed-data=true
# Database (Local MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/petz_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:u500#IIT}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis (Cloud)
spring.data.redis.host=redis-12721.c212.ap-south-1-1.ec2.cloud.redislabs.com
spring.data.redis.port=12721
spring.data.redis.password=${REDIS_PASSWORD:local-dev-no-redis}
spring.data.redis.ssl.enabled=true

# JWT
petz.jwt.secret=${JWT_SECRET:local-dev-secret-key-minimum-32-characters}
petz.jwt.expiration-ms=86400000
petz.jwt.temp-session-expiration-ms=43200000
petz.jwt.issuer=petz-platform

# OTP
petz.otp.expiry-minutes=5
petz.otp.max-requests-per-hour=5

# SOS Rate Limiting
petz.sos.rate-limit.max-per-hour=3

# File Upload (SOS Media)
app.file.upload-dir=uploads

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.time-zone=UTC

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true