# ── Server ──────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/api/v1

# ── DataSource ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/petz_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=u500#IIT
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────
petz.jwt.secret=petz-super-secret-key-that-is-at-least-32-characters-long
petz.jwt.expiration=86400000

# ── File Upload ──────────────────────────────────────────
petz.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ── Logging ─────────────────────────────────────────────
logging.level.com.petz=INFO
logging.level.org.springframework.security=WARN
