# ── Server ──────────────────────────────────────────────
server.port=${PORT:8081}
server.servlet.context-path=/api/v1
# Local overrides (gitignored) are loaded automatically when present
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/petzdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Navya@071
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

petz.jwt.secret=${JWT_SECRET:e0d9a80c7e18deeddeddb2b704ce1170df92a5b1c570e71751cb2bc0fb60def3}
petz.jwt.legacy-secret=${JWT_LEGACY_SECRET:petz-super-secret-key-that-is-at-least-32-characters-long}
petz.jwt.expiration=86400000

# ── File Upload ──────────────────────────────────────────
petz.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ── Gemini AI (Healio chatbot) ───────────────────────────
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.0-flash-lite

# ── Logging ─────────────────────────────────────────────
logging.level.com.petz=INFO
logging.level.org.springframework.security=WARN
