# ══════════════════════════════════════════════════════════════
#  PETZ — Codespace / Local Dev Profile
#  Activated with: --spring.profiles.active=codespace
#  Uses H2 in-memory DB — no MySQL / Railway credentials needed
# ══════════════════════════════════════════════════════════════

# ── H2 In-Memory Database ─────────────────────────────────────
# MODE=MySQL makes H2 accept MySQL-flavoured SQL from Hibernate
spring.datasource.url=jdbc:h2:mem:petzdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 web console (browse at /api/v1/h2-console in the Codespace)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ── JPA / Hibernate ───────────────────────────────────────────
# create-drop → schema is built fresh on startup, torn down on shutdown
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# ── JWT (safe placeholder for dev — never use in production) ──
petz.jwt.secret=petz-codespace-dev-secret-key-must-be-at-least-32-chars
petz.jwt.legacy-secret=

# ── CORS ──────────────────────────────────────────────────────
# Allows:
#   • Angular dev server running locally
#   • Any GitHub Codespace forwarded URL (wildcard pattern)
cors.allowed-origins=http://localhost:4200,https://*.app.github.dev,https://*.preview.app.github.dev

# ── Logging (more verbose for dev) ────────────────────────────
logging.level.com.petz=DEBUG
logging.level.org.springframework.security=INFO
