# ══════════════════════════════════════════════════════════════
#  PETZ — Codespace / Local Dev Profile
#  Activated with: --spring.profiles.active=codespace
#  Uses MySQL 8 running INSIDE the Codespace container
#  No Railway credentials needed — MySQL runs on localhost:3306
# ══════════════════════════════════════════════════════════════

# ── MySQL (localhost — installed by devcontainer feature) ─────
spring.datasource.url=jdbc:mysql://localhost:3306/petzdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# update → Hibernate creates/alters tables to match entities on startup
# (schema.sql is skipped — not needed, Hibernate handles DDL)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.sql.init.mode=never

# ── JWT (safe placeholder for dev — never use in production) ──
petz.jwt.secret=petz-codespace-dev-secret-key-must-be-at-least-32-chars
petz.jwt.legacy-secret=

# ── CORS ──────────────────────────────────────────────────────
# Allows:
#   • Angular dev server running locally
#   • Any GitHub Codespace forwarded URL (wildcard pattern)
cors.allowed-origins=http://localhost:4200,https://*.app.github.dev,https://*.preview.app.github.dev

# ── Logging (more verbose for dev) ────────────────────────────
logging.level.com.petz=DEBUG
logging.level.org.springframework.security=INFO
