# ── Server ──────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/api/v1

# Local overrides (gitignored) are loaded automatically when present
spring.config.import=optional:classpath:application-local.properties

# ── DataSource ──────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────
petz.jwt.secret=${JWT_SECRET}
petz.jwt.legacy-secret=${JWT_LEGACY_SECRET:}
petz.jwt.expiration=86400000

# ── File Upload ──────────────────────────────────────────
petz.upload.dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ── Logging ─────────────────────────────────────────────
logging.level.com.petz=INFO
logging.level.org.springframework.security=WARN
